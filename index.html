<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AIM PASIVE DRAG OPTIMIZER</title>

<link rel="apple-touch-icon" href="icon.png">

<style>

* {
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body {
    margin:0;
    min-height:100vh;
    background:#050505;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}


.container {
    width:90%;
    max-width:420px;
    background:#111;
    padding:25px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 30px #0066ff;
}


.logo {
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#00ffff,#0066ff);
    font-size:30px;
    font-weight:bold;
}


h1 {
    font-size:24px;
}


.subtitle {
    color:#aaa;
}


button {

    width:100%;
    padding:15px;
    margin:10px 0;

    border:0;
    border-radius:15px;

    background:#0066ff;

    color:white;
    font-size:16px;
    font-weight:bold;

}


button:active {
    background:#00aaaa;
}


#status {

    margin-top:15px;
    padding:10px;
    border-radius:10px;
    background:#080808;
    color:#00ff99;

}


.footer {

    margin-top:20px;
    color:#555;
    font-size:12px;

}

</style>

</head>


<body>


<div class="container">


<div class="logo">
RZ
</div>


<h1>
AIM PASIVE DRAG OPTIMIZER
</h1>


<div class="subtitle">
RakzZaynix Device
</div>


<button onclick="menu('Easy Drag')">
Easy Drag
</button>


<button onclick="menu('Easy Lock')">
Easy Lock
</button>


<button onclick="menu('Bypass Engineer')">
Bypass Engineer
</button>


<div id="status">
System Ready
</div>


<div class="footer">
AIM PASIVE DRAG OPTIMIZER © RakzZaynix
</div>


</div>



<script>

function menu(x){

document.getElementById("status").innerHTML =
x + " Selected";

}

</script>


</body>
</html>
